<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tankpedia</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f5f8;
      color: #1f2937;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .logo {
      width: 10rem;
      height: 10rem;
      animation: bounce 2s ease-in-out infinite;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
    p { font-size: 1.1rem; color: #475569; max-width: 500px; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 1rem;
      font-size: 1.2rem;
      font-weight: 700;
    }
    .btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <img src="IMG/Tank%20Logo.png" class="logo" alt="Tankpedia" />
  <h1>Tankpedia</h1>
  <p>Een encyclopedie van militaire tanks. Zoek door 259 tanks uit 21 landen, bekijk stats van Wikipedia, sla favorieten op en vergelijk tanks met elkaar.</p>
  <a href="./app.html?view=app" class="btn">Naar de app</a>
</body>
</html>
