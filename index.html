<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Titel en meta tags voor mobiel / iOS / thema -->
  <title>Tankpedia</title>
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="icon" href="IMG/Tank%20Logo.png" type="image/png">
  <link rel="apple-touch-icon" href="IMG/Tank%20Logo.png">

  <!-- PWA manifest alleen laden via HTTP (niet lokaal file://) -->
  <script>
    if (location.protocol !== "file:") {
      const link = document.createElement("link");
      link.rel = "manifest";
      link.href = "manifest.json";
      document.head.appendChild(link);
    }
  </script>

  <!-- Externe CSS bestanden gesplitst per categorie -->
  <link rel="stylesheet" href="STYLES/base.css">
  <link rel="stylesheet" href="STYLES/app.css">
  <link rel="stylesheet" href="STYLES/responsive.css">
</head>
<body>

  <!-- Splash / beginscherm – eerste wat gebruikers zien -->
  <section id="splash-screen" class="splash">
    <img src="IMG/Tank%20Logo.png" class="logo" alt="Tankpedia" />
    <h1>Tankpedia</h1>
    <p>Een encyclopedie van militaire tanks. Zoek door 259 tanks uit 21 landen, bekijk stats van Wikipedia, sla favorieten op en vergelijk tanks met elkaar.</p>
    <a id="open-app" href="#app" class="btn">Naar de app</a>
  </section>

  <!-- App shell – hoofdinterface (verborgen tot #app hash) -->
  <section id="app-shell" hidden>
    <!-- Bovenste balk met logo, titel en navigatieknoppen -->
    <header class="topbar">
      <div class="brand">
        <img src="IMG/Tank%20Logo.png" alt="Tankpedia">
        <div>
          <h1 id="app-title">Tankpedia</h1>
          <p>Militaire tankencyclopedie</p>
        </div>
      </div>
      <div class="toolbar">
        <button id="lang-btn" type="button">EN</button>
        <button id="nav-search" type="button" class="nav-link active">Zoeken</button>
        <button id="nav-fav" type="button" class="nav-link">Favorieten</button>
      </div>
    </header>

    <main>
      <!-- Zoekpagina -->
      <section id="page-search" class="page active">
        <div class="search-panel">
          <input id="search" type="search" placeholder="Zoek tanks..." autocomplete="off">
          <button id="search-button" type="button">Zoeken</button>
        </div>
        <div id="output"></div>
      </section>

      <!-- Favorietenpagina -->
      <section id="page-fav" class="page">
        <div id="fav-list"></div>
      </section>
    </main>

    <!-- Modal overlay voor tankdetails / vergelijking -->
    <div id="modal-overlay">
      <div class="modal-content">
        <button id="modal-close" type="button">Sluiten</button>
        <div id="modal-body"></div>
      </div>
    </div>
  </section>

  <!-- Hoofd JavaScript (defer = pas na HTML parsing) -->
  <script src="SCRIPTS/app.js" defer></script>

  <!-- Inline script voor splash → app navigatie op basis van URL hash -->
  <script>
    const splashScreen = document.getElementById("splash-screen");
    const appShell = document.getElementById("app-shell");
    const openApp = document.getElementById("open-app");

    // Toon splash of app shell op basis van #app hash
    function syncView() {
      const showApp = location.hash === "#app";
      splashScreen.hidden = showApp;
      appShell.hidden = !showApp;
    }

    // splash knop → zet hash op #app
    openApp.addEventListener("click", e => {
      e.preventDefault();
      location.hash = "app";
      syncView();
    });

    // Bij hash wijziging (bijv. Home knop) view bijwerken
    window.addEventListener("hashchange", syncView);
    syncView();
  </script>
</body>
</html>
